// Source: Upstox official market data feed proto (v3)
// https://upstox.com/developer/api-documentation/market-data-feed
// Trimmed to the fields this backend actually decodes (ltpc mode).

syntax = "proto3";
package com.upstox.marketdatafeeder.rpc.proto;

message LTPC {
  double ltp = 1;
  int64 ltt = 2;
  double cp = 3;
}

message Feed {
  LTPC ltpc = 1;
}

message FeedResponse {
  string type = 1;
  map<string, Feed> feeds = 2;
  int64 currentTs = 3;
}
